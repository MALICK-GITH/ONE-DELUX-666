<!doctype html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0, user-scalable=yes" />
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#0a1628" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="RUST SIT XPR" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="application-name" content="RUST SIT XPR" />
  <meta name="msapplication-TileColor" content="#050508" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="robots" content="noindex,nofollow" />

  <title>RUST SIT XPR - Détail du match</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link
    href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Sora:wght@400;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>

<body>
  <div class="bg-grid" aria-hidden="true"></div>

  <header class="hero">
    <p class="tag">Match Detail</p>
    <h1>RUST SIT XPR</h1>
    <p id="subTitle">Détails complets du match avec analyse IA</p>

    <div class="controls">
      <a class="coupon-page-link" href="/">← Retour accueil</a>
      <a class="coupon-page-link" href="/coupon.html">Page Coupon</a>
      <button id="generateVisualBtn" type="button" class="visual-btn">📸 Générer l'image</button>
    </div>
    <div class="visual-options" aria-label="Options de génération d'image">
      <label class="visual-option" for="visualFormatSelect">
        <span>Format</span>
        <select id="visualFormatSelect">
          <option value="png" selected>PNG</option>
          <option value="jpeg">JPEG</option>
          <option value="webp">WebP</option>
        </select>
      </label>
      <label class="visual-option" for="visualQualitySelect">
        <span>Qualité</span>
        <select id="visualQualitySelect">
          <option value="0.85">Économie</option>
          <option value="0.92" selected>Équilibrée</option>
          <option value="0.98">Haute</option>
        </select>
      </label>
    </div>
  </header>

  <main id="main-content">
    <section class="match-detail-section" id="matchDetail">
      <div class="loading-card">Chargement du match...</div>
    </section>
  </main>

  <footer>
    <small id="updatedAt"></small>
    <small id="appVersionTag"></small>
    <p class="legal-foot">
      Informations et scores a titre indicatif. Paris interdits aux mineurs. Joue avec moderation.
    </p>
    <div class="site-signature">😈 Signé par <strong>SOLITAIRE HACK 🇨🇮</strong></div>
  </footer>

  <!-- API Client -->
  <script src="/site-api.js"></script>

  <!-- Visual Generator -->
  <script src="/visualGenerator.js"></script>

  <!-- Match Detail Script -->
  <script src="/match.js"></script>
</body>

</html>
