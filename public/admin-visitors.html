<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a1628" />
  <title>Admin - Visiteurs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
  <style>
    body {
      background: #0a1628;
      color: #e9f2ff;
      font-family: "Sora", Arial, sans-serif;
      padding: 20px;
    }
    .admin-container {
      max-width: 1200px;
      margin: 0 auto;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: rgba(16, 26, 48, 0.8);
      border: 1px solid rgba(122, 170, 255, 0.3);
      border-radius: 12px;
      padding: 20px;
    }
    .stat-card h3 {
      margin: 0 0 10px 0;
      font-size: 14px;
      color: #9ac4ff;
    }
    .stat-card .value {
      font-size: 32px;
      font-weight: 700;
      color: #f4f8ff;
    }
    .logs-section {
      background: rgba(16, 26, 48, 0.8);
      border: 1px solid rgba(122, 170, 255, 0.3);
      border-radius: 12px;
      padding: 20px;
    }
    .logs-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .logs-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .logs-table th,
    .logs-table td {
      padding: 10px;
      text-align: left;
      border-bottom: 1px solid rgba(122, 170, 255, 0.2);
    }
    .logs-table th {
      background: rgba(31, 58, 103, 0.5);
      font-weight: 600;
      color: #9ac4ff;
      font-size: 12px;
    }
    .logs-table tr:hover {
      background: rgba(122, 170, 255, 0.1);
    }
    .ip-address {
      font-family: monospace;
      color: #8cffc1;
      font-size: 12px;
    }
    .timestamp {
      color: #9ac4ff;
      font-size: 12px;
    }
    .device-info {
      font-size: 12px;
      color: #7a9bd6;
    }
    .device-type {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .device-type.mobile {
      background: rgba(37, 180, 255, 0.2);
      color: #25b4ff;
    }
    .device-type.tablet {
      background: rgba(217, 44, 44, 0.2);
      color: #d92c2c;
    }
    .device-type.desktop {
      background: rgba(44, 103, 217, 0.2);
      color: #2c67d9;
    }
    .device-type.unknown {
      background: rgba(122, 170, 255, 0.2);
      color: #9ac4ff;
    }
    .os-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 6px;
      border-radius: 4px;
      background: rgba(122, 170, 255, 0.1);
      font-size: 11px;
    }
    .browser-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 6px;
      border-radius: 4px;
      background: rgba(140, 255, 193, 0.1);
      font-size: 11px;
      color: #8cffc1;
    }
    .btn {
      background: linear-gradient(135deg, #2c67d9, #25b4ff);
      border: none;
      border-radius: 8px;
      color: #f4f8ff;
      padding: 10px 20px;
      cursor: pointer;
      font-weight: 600;
      font-family: "Sora", Arial, sans-serif;
    }
    .btn:hover {
      opacity: 0.9;
    }
    .btn-danger {
      background: linear-gradient(135deg, #d92c2c, #ff4d4d);
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: #9ac4ff;
    }
    .error {
      background: rgba(217, 44, 44, 0.2);
      border: 1px solid rgba(217, 44, 44, 0.5);
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="admin-container">
    <header style="margin-bottom: 30px;">
      <h1>📊 Admin - Visiteurs</h1>
      <p style="color: #9ac4ff;">Suivi des adresses IP et statistiques de visite</p>
    </header>

    <div id="errorContainer"></div>

    <div class="stats-grid">
      <div class="stat-card">
        <h3>Total Visites</h3>
        <div class="value" id="totalVisits">-</div>
      </div>
      <div class="stat-card">
        <h3>IPs Uniques</h3>
        <div class="value" id="uniqueIps">-</div>
      </div>
    </div>

    <div class="logs-section">
      <div class="logs-header">
        <h2>📝 Logs Récents</h2>
        <div>
          <button class="btn" onclick="loadStats()">🔄 Rafraîchir</button>
          <button class="btn btn-danger" onclick="clearLogs()">🗑️ Nettoyer logs</button>
        </div>
      </div>
      <div id="logsContainer">
        <div class="loading">Chargement...</div>
      </div>
    </div>
  </div>

  <script>
    async function loadStats() {
      try {
        const response = await fetch('/api/visitors/stats');
        const data = await response.json();

        if (data.success) {
          document.getElementById('totalVisits').textContent = data.stats.total;
          document.getElementById('uniqueIps').textContent = data.stats.uniqueIps;
          
          renderLogs(data.stats.recent);
        } else {
          showError('Erreur: ' + data.error);
        }
      } catch (error) {
        showError('Erreur de chargement: ' + error.message);
      }
    }

    function renderLogs(logs) {
      const container = document.getElementById('logsContainer');
      
      if (logs.length === 0) {
        container.innerHTML = '<p style="text-align: center; color: #9ac4ff; padding: 20px;">Aucun log disponible</p>';
        return;
      }

      const table = document.createElement('table');
      table.className = 'logs-table';
      
      table.innerHTML = `
        <thead>
          <tr>
            <th>Timestamp</th>
            <th>IP</th>
            <th>Appareil</th>
            <th>OS</th>
            <th>Browser</th>
            <th>Méthode</th>
            <th>Path</th>
          </tr>
        </thead>
        <tbody>
          ${logs.map(log => `
            <tr>
              <td class="timestamp">${new Date(log.timestamp).toLocaleString('fr-FR')}</td>
              <td class="ip-address">${log.ip}</td>
              <td class="device-info">
                <span class="device-type ${log.device_type || 'unknown'}">${log.device_type || 'unknown'}</span>
                ${log.device_model && log.device_model !== 'unknown' ? `<br><small>${log.device_vendor || ''} ${log.device_model}</small>` : ''}
              </td>
              <td class="device-info">
                <span class="os-badge">${log.os_name || 'unknown'} ${log.os_version || ''}</span>
              </td>
              <td class="device-info">
                <span class="browser-badge">${log.browser_name || 'unknown'} ${log.browser_version || ''}</span>
              </td>
              <td>${log.method}</td>
              <td>${log.path}</td>
            </tr>
          `).join('')}
        </tbody>
      `;

      container.innerHTML = '';
      container.appendChild(table);
    }

    async function clearLogs() {
      if (!confirm('Voulez-vous vraiment nettoyer les logs anciens (garder 30 jours)?')) {
        return;
      }

      try {
        const response = await fetch('/api/visitors/clear', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ daysToKeep: 30 })
        });
        const data = await response.json();

        if (data.success) {
          alert(`${data.deleted} logs supprimés`);
          loadStats();
        } else {
          showError('Erreur: ' + data.error);
        }
      } catch (error) {
        showError('Erreur: ' + error.message);
      }
    }

    function showError(message) {
      const container = document.getElementById('errorContainer');
      container.innerHTML = `<div class="error">${message}</div>`;
    }

    // Load stats on page load
    loadStats();
    
    // Auto-refresh every 30 seconds
    setInterval(loadStats, 30000);
  </script>
</body>
</html>
